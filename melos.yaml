name: flutter_advanced_course_multi_modular_clean_architecture
packages:
  - core/**
  - features/**
#  - features/movies

command:
  bootstrap:
    environment:
      sdk: ^3.5.3
      flutter: ">=1.17.0"

    dependencies:
      dio: ^5.8.0+1

    dev_dependencies:
      flutter_lints: ^5.0.0

scripts:
  clean: melos clean
  cleanAndBootstrap: melos clean && melos bootstrap
  test:
#    run: melos exec --concurrency=1 -- flutter test --reporter expanded
    run: melos exec flutter test
    #--concurrency=1 → Runs tests one module at a time, avoiding Flutter startup locks.
    #
    #--reporter expanded → Ensures all test descriptions & assertions are printed

  update: flutter pub outdated
  upgrade: flutter pub upgrade --major-versions